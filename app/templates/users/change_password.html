{% extends "base.html" %}
{% block title %}تغيير كلمة المرور{% endblock %}
{% block breadcrumb %}تغيير كلمة المرور{% endblock %}

{% block content %}
<div class="page-header">
  <div><div class="page-title">تغيير كلمة المرور</div></div>
</div>
<div style="max-width:460px;">
  <div class="card">
    <form method="post" action="{{ url_for('users.change_password') }}">
      <div class="form-group" style="margin-bottom:14px;">
        <label>كلمة المرور الحالية</label>
        <input class="input" type="password" name="current_password" required placeholder="••••••••"/>
      </div>
      <div class="form-group" style="margin-bottom:14px;">
        <label>كلمة المرور الجديدة</label>
        <input class="input" type="password" name="new_password" required placeholder="••••••••" minlength="6"/>
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label>تأكيد كلمة المرور الجديدة</label>
        <input class="input" type="password" name="confirm_password" required placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
        <i class="fas fa-lock"></i> تغيير كلمة المرور
      </button>
    </form>
  </div>
</div>
{% endblock %}
